<!DOCTYPE html>
<html lang="ru" data-base="../">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/x-icon" href="../assets/favicon/favicon.ico" />

  <body class="page" data-page="404">

            <div class="not-found__content">
              <h1 class="not-found__title" id="not-found-title">Страница не найдена</h1>

                </span>
                <span class="not-found__desc-line">

                  <a class="not-found__link" href="../index.html" data-link="index.html">Главную страницу.</a>

            </div>
          </div>
        </div>
      </section>

    <div id="site-footer"></div>

    <script type="module" src="../js/layout.js"></script>
    <script src="../js/pages/404.js" defer></script>
